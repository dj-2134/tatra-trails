<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TatraTrails — Admin</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath fill='%2315633f' d='M1 28 L11 8 L17 19 L21 13 L31 28 Z'/%3E%3C/svg%3E">
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <!-- Anti-flash: set the theme class before first paint (mirrors js/theme.js). -->
  <script>
    (function () {
      try {
        var s = localStorage.getItem("tt-theme");
        var t = (s === "light" || s === "dark")
          ? s
          : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.classList.add(t);
      } catch (e) { document.documentElement.classList.add("light"); }
    })();
  </script>
</head>
<body class="admin">
  <header class="admin-bar">
    <span class="brand-name">🏔 TatraTrails — Admin</span>
    <button id="sign-out" class="chip" type="button" hidden>Sign out</button>
  </header>

  <!-- Login view (no session) -->
  <section id="login-view" class="admin-login" hidden>
    <h1>Admin sign in</h1>
    <p>Enter the founder email to receive a magic link.</p>
    <form id="login-form">
      <input id="login-email" type="email" required placeholder="you@example.com" autocomplete="email" />
      <button type="submit" class="chip">Send magic link</button>
    </form>
    <p id="login-msg" class="admin-msg" role="status"></p>
  </section>

  <!-- Admin view (signed in) -->
  <main id="admin-view" class="admin-grid" hidden>
    <aside class="admin-list-pane">
      <button id="new-hike" class="chip" type="button">+ New hike</button>
      <div id="admin-hike-list" class="admin-hike-list" aria-label="Hikes"></div>
      <details class="admin-visibility">
        <summary>Public regions</summary>
        <div id="region-visibility-list"></div>
      </details>
      <details class="admin-visibility">
        <summary>Viewers (friends)</summary>
        <div id="viewer-list"></div>
        <div class="admin-viewer-add">
          <input id="viewer-email" type="email" placeholder="friend@gmail.com" />
          <select id="viewer-role"><option value="friend">friend</option><option value="owner">owner</option></select>
          <button id="add-viewer" class="chip" type="button">Add</button>
        </div>
      </details>
    </aside>

    <section id="editor-pane" class="admin-editor" hidden>
      <div id="admin-map" class="admin-map"></div>
        <div id="map-resize" class="map-resize-handle" title="Drag to resize the map">• • •</div>
      <div class="admin-editor-head">
        <h2 id="editor-title">New hike</h2>
        <span id="editor-status" class="status-badge open">open</span>
      </div>

      <form id="hike-form" class="admin-form">
        <label>Slug <input id="f-slug" required /></label>
        <label>Name (EN) <input id="f-name-en" required /></label>
        <label>Name (SK) <input id="f-name-sk" required /></label>
        <button type="button" id="copy-arrow" class="chip" title="Copy → to clipboard">→</button>
        <label class="admin-check"><input id="f-public" type="checkbox" /> Public (visible on the board)</label>
        <fieldset class="admin-seasonal">
          <legend>Seasonal closure (optional)</legend>
          <label>From (MM-DD) <input id="f-seasonal-from" placeholder="11-01" /></label>
          <label>To (MM-DD) <input id="f-seasonal-to" placeholder="06-15" /></label>
          <label class="admin-check"><input id="f-seasonal-partial" type="checkbox" /> Partial</label>
          <div class="admin-wm-actions">
            <button id="seasonal-extent" class="chip" type="button">Set extent</button>
            <button id="seasonal-extent-clear" class="chip" type="button" hidden>Clear extent</button>
            <span id="seasonal-extent-status" class="admin-msg"></span>
          </div>
        </fieldset>
        <label>Note (EN) <textarea id="f-note-en" rows="2"></textarea></label>
        <label>Note (SK) <textarea id="f-note-sk" rows="2"></textarea></label>
        <label>Ref <input id="f-ref" placeholder="tanap.org/…" /></label>
        <div class="admin-geom">
          <label>Route (GPX) <input id="f-gpx" type="file" accept=".gpx" /></label>
          <span id="f-geom-status" class="admin-msg"></span>
        </div>
        <fieldset class="admin-waymarks">
          <legend>Waymarks</legend>
          <div id="wm-seg-list"></div>
          <div class="admin-wm-actions">
            <button id="wm-add-split" class="chip" type="button">+ Add split</button>
            <button id="wm-reset" class="chip" type="button">Reset</button>
            <span id="wm-hint" class="admin-msg"></span>
          </div>
        </fieldset>
        <div class="admin-stats">
          <label>Distance (km) <input id="f-distance" type="number" min="0" step="0.1" /></label>
          <label>Elevation gain (m) <input id="f-ascent" type="number" min="0" step="1" /></label>
          <label>Walking time
            <span class="admin-hm">
              <input id="f-dur-h" type="number" min="0" step="1" /> h
              <input id="f-dur-min" type="number" min="0" max="59" step="1" /> min
            </span>
          </label>
          <span id="f-stats-hint" class="admin-msg"></span>
        </div>
        <fieldset class="admin-regions">
          <legend>Regions (pick at least one)</legend>
          <input id="f-region-filter" placeholder="Filter ranges…" />
          <div id="f-region-list" class="admin-region-list" role="group" aria-label="Regions"></div>
        </fieldset>
      </form>

      <section class="admin-closures">
        <h3>Ad-hoc closures</h3>
        <div id="closure-list"></div>
        <button id="add-closure" class="chip" type="button">+ Add closure</button>
      </section>

      <div class="admin-actions">
        <button id="save-hike" class="chip" type="button">Save</button>
        <button id="delete-hike" class="chip admin-danger" type="button" hidden>Delete hike</button>
        <span id="editor-msg" class="admin-msg" role="status"></span>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="js/admin/ui.js"></script>
</body>
</html>
